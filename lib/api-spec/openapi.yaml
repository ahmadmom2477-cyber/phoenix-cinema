openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Am Cinema API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: search
    description: Movie and TV search operations
  - name: proxy
    description: Video proxy operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /search:
    get:
      operationId: searchMedia
      tags: [search]
      summary: Search movies and TV shows
      description: Search OMDB/IMDB for movies, TV shows, and episodes
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (movie/show name)
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [movie, series, episode]
          description: Type of media to search for
        - name: year
          in: query
          required: false
          schema:
            type: string
          description: Year of release (optional filter)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /media/{imdbId}:
    get:
      operationId: getMediaDetails
      tags: [search]
      summary: Get detailed info for a specific IMDB ID
      parameters:
        - name: imdbId
          in: path
          required: true
          schema:
            type: string
          description: IMDB ID (e.g. tt0308506)
      responses:
        "200":
          description: Media details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDetails"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trending/movies:
    get:
      operationId: getTrendingMovies
      tags: [search]
      summary: Get trending/popular movies
      responses:
        "200":
          description: Trending movies list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /trending/series:
    get:
      operationId: getTrendingSeries
      tags: [search]
      summary: Get trending/popular TV series
      responses:
        "200":
          description: Trending series list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /downloads/{imdbId}:
    get:
      operationId: getDownloadLinks
      tags: [search]
      summary: Get download links for a movie or TV episode
      parameters:
        - name: imdbId
          in: path
          required: true
          schema:
            type: string
          description: IMDB ID (e.g. tt0468569)
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [movie, series]
          description: Media type
        - name: season
          in: query
          required: false
          schema:
            type: string
          description: Season number (TV series only)
        - name: episode
          in: query
          required: false
          schema:
            type: string
          description: Episode number (TV series only)
      responses:
        "200":
          description: Download links by quality
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadLinks"

  /proxy:
    get:
      operationId: proxyVideo
      tags: [proxy]
      summary: Proxy video embed URL to strip restrictive headers
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
          description: Vidsrc embed URL to proxy
      responses:
        "200":
          description: Proxied video content (HTML)
          content:
            text/html:
              schema:
                type: string
        "500":
          description: Proxy error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DownloadLink:
      type: object
      properties:
        quality:
          type: string
          description: e.g. "720p", "1080p", "2160p"
        type:
          type: string
          description: e.g. "bluray", "web", "hdtv"
        size:
          type: string
          description: Human-readable file size
        magnet:
          type: string
          description: Magnet URI for torrent client
        torrentUrl:
          type: string
          description: Direct .torrent file URL
        seeds:
          type: integer
        peers:
          type: integer
      required:
        - quality

    DownloadLinks:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: "#/components/schemas/DownloadLink"
        browseUrl:
          type: string
          description: Fallback URL to browse the title on YTS/EZTV
        source:
          type: string
          description: Data source name (e.g. "yts", "eztv")
        available:
          type: boolean
      required:
        - links
        - available

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SearchResult:
      type: object
      properties:
        imdbId:
          type: string
          description: IMDB ID (e.g. tt0308506)
        title:
          type: string
        year:
          type: string
        type:
          type: string
          enum: [movie, series, episode]
        poster:
          type: string
          description: URL to poster image
        rated:
          type: string
        plot:
          type: string
        genre:
          type: string
        imdbRating:
          type: string
        totalSeasons:
          type: string
      required:
        - imdbId
        - title
        - year
        - type

    SearchResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        total:
          type: integer
      required:
        - results
        - total

    MediaDetails:
      type: object
      properties:
        imdbId:
          type: string
        title:
          type: string
        year:
          type: string
        type:
          type: string
          enum: [movie, series, episode]
        poster:
          type: string
        rated:
          type: string
        plot:
          type: string
        genre:
          type: string
        director:
          type: string
        actors:
          type: string
        imdbRating:
          type: string
        runtime:
          type: string
        totalSeasons:
          type: string
        language:
          type: string
        country:
          type: string
        awards:
          type: string
      required:
        - imdbId
        - title
        - year
        - type
